version: '3.8'

services:
  app:
     image:  nginx
     container_name: nginx-app
     ports:
        - "8083:80"

  database:
   image: mysql:8.0
   container_name: mysql-db
   restart: always
   environment:
     MYSQL_ROOT_PASSWORD: root
     MYSQL_DATABASE: mydb
     MYSQL_USER: user
     MYSQL_PASSWORD: password
   ports:
     - "3306:3306"
